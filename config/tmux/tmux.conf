# Prefix
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# General
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g set-clipboard on
set -g display-time 4000
setw -g aggressive-resize on
set -g detach-on-destroy off

# Status bar
set -g status-position top
set -g status-interval 5
set -g status-left-length 30
set -g status-right-length 50
set -g window-status-separator ""

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded"

# Rename window / session
bind w command-prompt -I "#W" "rename-window -- '%%'"
bind R command-prompt -I "#S" "rename-session -- '%%'"

# Vi mode for copy
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Copy-mode-vi pane selection
bind -T copy-mode-vi C-h select-pane -L
bind -T copy-mode-vi C-j select-pane -D
bind -T copy-mode-vi C-k select-pane -U
bind -T copy-mode-vi C-l select-pane -R

# Saner splits that open in the same directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# New windows in same directory
bind c new-window -c "#{pane_current_path}"

# Sessions
bind C new-session
bind X kill-session

# smart-splits.nvim pane navigation (uses @pane-is-vim user var)
bind -n C-h if -F "#{@pane-is-vim}" "send-keys C-h" "select-pane -L"
bind -n C-j if -F "#{@pane-is-vim}" "send-keys C-j" "select-pane -D"
bind -n C-k if -F "#{@pane-is-vim}" "send-keys C-k" "select-pane -U"
bind -n C-l if -F "#{@pane-is-vim}" "send-keys C-l" "select-pane -R"

# Send C-l through for clearing the screen (prefix + C-l)
bind C-l send-keys C-l

# smart-splits.nvim pane resizing
bind -n M-h if -F "#{@pane-is-vim}" "send-keys M-h" "resize-pane -L 3"
bind -n M-j if -F "#{@pane-is-vim}" "send-keys M-j" "resize-pane -D 3"
bind -n M-k if -F "#{@pane-is-vim}" "send-keys M-k" "resize-pane -U 3"
bind -n M-l if -F "#{@pane-is-vim}" "send-keys M-l" "resize-pane -R 3"

# sesh session launcher
bind T display-popup -E -w 40% "sesh connect \"$(
  sesh list -i | fzf-tmux -p 55%,60% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list -i)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -it)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -ic)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -iz)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list -i)'
)\""

# TPM plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'janoamaral/tokyo-night-tmux'

# tmux-continuum: auto-save every 15 min and auto-restore
set -g @continuum-restore 'on'

# tokyo-night-tmux (storm is closest to Kitty's moon variant)
set -g @tokyo-night-tmux_theme storm
set -g @tokyo-night-tmux_show_datetime 0
set -g @tokyo-night-tmux_show_path 1
set -g @tokyo-night-tmux_path_format relative
set -g @tokyo-night-tmux_window_id_style dsquare
set -g @tokyo-night-tmux_show_git 1

# Initialize TPM (keep at very bottom)
run '~/.tmux/plugins/tpm/tpm'
